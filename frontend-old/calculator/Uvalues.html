<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Value Calculator Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 2rem; background: #f3f4f6; color: #111827; }
        .container { max-width: 800px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; text-align: center; }
        th, td { padding: 12px; border: 1px solid #e5e7eb; }
        th { background-color: #4f46e5; color: white; }
        .btn-primary { background: #4f46e5; color: white; padding: 0.7rem 1.5rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; float: right; margin-top: 2rem; }
        .btn-primary:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="container">
    <h2>Wall U-Value Calculations (Step 2)</h2>
    <table>
        <thead>
            <tr>
                <th>Wall</th>
                <th>Rso (Outside)</th>
                <th>Rb (Body)</th>
                <th>Rsi (Inside)</th>
                <th>Raa (Total R)</th>
                <th>Total U-Value</th>
            </tr>
        </thead>
        <tbody id="results-body"></tbody>
    </table>

    <button class="btn-primary" onclick="window.location.href='result.html'">Next: Final Heat Table</button>
    <div style="clear: both;"></div>
</div>

<script src="Uvalues.js"></script>
</body>
</html>
