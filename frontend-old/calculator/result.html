<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Heat Load Table</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        body { font-family: 'Inter', sans-serif; padding: 2rem; background: var(--bg); color: var(--text-main); margin: 0; }
        .container { max-width: 1500px; margin: auto; background: var(--surface); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        h2 { border-bottom: 2px solid var(--border); padding-bottom: 0.75rem; margin-top: 0; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; font-size: 0.85rem; text-align: center; }
        th, td { padding: 10px 8px; border: 1px solid var(--border); }
        th { background-color: var(--primary); color: white; font-weight: 500; white-space: nowrap; }
        td:first-child { text-align: left; font-weight: 600; background-color: #f9fafb; white-space: nowrap; }
        .disabled-cell { color: #9ca3af; background-color: #f3f4f6; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-top: 2rem; }
        .summary-card { background: #f9fafb; border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; text-align: center; }
        .summary-card h4 { margin: 0; color: var(--text-muted); font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-card p { margin: 0.5rem 0 0; font-size: 1.75rem; font-weight: 700; color: var(--primary); }
        .btn-success { background: #10b981; color: white; padding: 0.7rem 1.5rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; float: right; margin-top: 2rem; }
        .btn-success:hover { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h2>Final Heat Calculation Table</h2>
    <table>
        <thead>
            <tr>
                <th>Surface</th><th>A (m²)</th><th>U (W/m²K)</th><th>qc (A×U)</th><th>Rso</th>
                <th>G</th><th>&alpha; (alpha)</th><th>SGF</th><th>e</th>
                <th>Qsoi</th><th>Qswi</th><th>&Delta;T (Tout - Tin)</th><th>Qci</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <div class="summary-grid" id="summary-section"></div>

    <button class="btn-success" onclick="saveToServer()">Save Calculation to Server</button>
    <div style="clear: both;"></div>
</div>

<script src="result.js"></script>
</body>
</html>
